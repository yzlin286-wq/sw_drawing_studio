# v2.1 Task 4: Document Manager 配置
# 支持 SW_DM_LICENSE_KEY、dry_run / apply 模式

# License key（也可通过环境变量 SW_DM_LICENSE_KEY 设置）
# 获取方式: SOLIDWORKS 官方申请 Document Manager API license
license_key: ""

# 默认操作模式
# dry_run: 仅读取引用，不执行 ReplaceReference
# apply: 读取引用并执行 ReplaceReference
default_mode: "dry_run"

# DLL 路径（自动检测，可手动覆盖）
# dll_path: "C:\\Program Files\\SOLIDWORKS Corp25\\SOLIDWORKS\\SolidWorks.Interop.swdocumentmgr.dll"

# COM ProgID
com_progid: "SwDocumentMgr.SwDMApplication"
class_factory_progid: "SwDocumentMgr.SwDMClassFactory"

# 引用替换规则
# 当 drawing 引用的 part 路径与期望路径不一致时，执行 ReplaceReference
relink:
  # 是否启用自动 relink
  enabled: true
  # 替换前是否备份原 drawing
  backup_before_replace: true
  # 备份目录（相对于 run_dir）
  backup_dir: "input_work"

# 输出
output:
  # 结果文件名
  result_file: "docmgr_result.json"
  # 是否写入 manifest
  write_manifest: true
